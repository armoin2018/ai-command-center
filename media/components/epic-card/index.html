<!-- Epic Card Component -->
<div class="epic-card card">
    <div class="card-header">
        <div class="epic-header">
            <span class="epic-icon">
                <i class="bi bi-flag-fill"></i>
            </span>
            <h5 class="epic-title">Epic Title</h5>
            <span class="epic-status badge"></span>
        </div>
        <div class="epic-actions">
            <button class="btn btn-sm btn-link epic-edit" title="Edit">
                <i class="bi bi-pencil"></i>
            </button>
            <button class="btn btn-sm btn-link epic-delete" title="Delete">
                <i class="bi bi-trash"></i>
            </button>
        </div>
    </div>
    
    <div class="card-body">
        <div class="epic-id text-muted mb-2"></div>
        <p class="epic-description"></p>
        
        <div class="epic-metadata">
            <div class="epic-meta-item">
                <i class="bi bi-person"></i>
                <span class="epic-assignee">Unassigned</span>
            </div>
            <div class="epic-meta-item">
                <i class="bi bi-calendar"></i>
                <span class="epic-created"></span>
            </div>
            <div class="epic-meta-item">
                <i class="bi bi-clock-history"></i>
                <span class="epic-updated"></span>
            </div>
        </div>
        
        <div class="epic-progress mt-3">
            <div class="progress-label d-flex justify-content-between">
                <span>Progress</span>
                <span class="epic-progress-text">0%</span>
            </div>
            <div class="progress">
                <div class="progress-bar epic-progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
            </div>
        </div>
        
        <div class="epic-stats mt-3">
            <span class="badge bg-info">
                <i class="bi bi-book"></i>
                <span class="epic-stories-count">0</span> Stories
            </span>
            <span class="badge bg-secondary">
                <i class="bi bi-check-square"></i>
                <span class="epic-tasks-count">0</span> Tasks
            </span>
        </div>
    </div>
    
    <div class="card-footer">
        <button class="btn btn-sm btn-primary epic-add-story">
            <i class="bi bi-plus-circle"></i>
            Add Story
        </button>
        <button class="btn btn-sm btn-outline-primary epic-view-details">
            <i class="bi bi-eye"></i>
            View Details
        </button>
    </div>
</div>
