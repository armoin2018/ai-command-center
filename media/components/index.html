<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src vscode-resource: https: data:; script-src 'unsafe-inline' 'unsafe-eval' vscode-resource: https:; style-src 'unsafe-inline' vscode-resource: https:; font-src vscode-resource: https:;">
    <title>AI Command Center - Planning View</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Chart.js -->
    <link href="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.min.css" rel="stylesheet">
    
    <!-- Tabulator -->
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_bootstrap5.min.css" rel="stylesheet">
    
    <!-- Tagify -->
    <link href="https://cdn.jsdelivr.net/npm/@yaireo/tagify/dist/tagify.css" rel="stylesheet">
    
    <!-- Main Application Styles -->
    <style>
        :root {
            --vscode-editor-background: #ffffff;
            --vscode-editor-foreground: #333333;
            --vscode-panel-border: #e0e0e0;
            --vscode-list-hoverBackground: #f3f3f3;
            --vscode-list-activeSelectionBackground: #0078d4;
            --vscode-list-activeSelectionForeground: #ffffff;
            --vscode-focusBorder: #0078d4;
        }

        [data-vscode-theme-kind="vscode-dark"] {
            --vscode-editor-background: #1e1e1e;
            --vscode-editor-foreground: #d4d4d4;
            --vscode-panel-border: #3c3c3c;
            --vscode-list-hoverBackground: #2a2d2e;
            --vscode-list-activeSelectionBackground: #094771;
            --vscode-list-activeSelectionForeground: #ffffff;
            --vscode-focusBorder: #007fd4;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--vscode-editor-background);
            color: var(--vscode-editor-foreground);
        }

        #app {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        #toolbar {
            border-bottom: 1px solid var(--vscode-panel-border);
        }

        #main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        #sidebar {
            width: 300px;
            border-right: 1px solid var(--vscode-panel-border);
            overflow-y: auto;
        }

        #content-area {
            flex: 1;
            overflow-y: auto;
        }

        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--vscode-editor-background);
            z-index: 9999;
        }

        .loading-screen.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading" class="loading-screen">
        <div class="text-center">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3">Loading AI Command Center...</p>
        </div>
    </div>

    <!-- Main Application -->
    <div id="app" class="d-none">
        <!-- Toolbar Component -->
        <div id="toolbar"></div>

        <!-- Main Content Area -->
        <div id="main-content">
            <!-- Sidebar with Planning Tree -->
            <div id="sidebar"></div>

            <!-- Content Area -->
            <div id="content-area" class="p-3">
                <div id="details-panel"></div>
            </div>
        </div>
    </div>

    <!-- External Libraries -->
    
    <!-- jQuery (required by Bootstrap) -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Lodash -->
    <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>
    
    <!-- Moment.js -->
    <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.umd.js"></script>
    
    <!-- Tabulator -->
    <script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
    
    <!-- Tagify -->
    <script src="https://cdn.jsdelivr.net/npm/@yaireo/tagify"></script>

    <!-- MCP API Client (TypeScript compiled to JS) -->
    <script src="/media/api/mcpClient.js"></script>
    
    <!-- Component Loader -->
    <script src="/media/lib/componentLoader.js"></script>

    <!-- Application Initialization -->
    <script>
        (function() {
            'use strict';

            // VSCode API (if running in webview)
            const vscode = (typeof acquireVsCodeApi !== 'undefined') ? acquireVsCodeApi() : null;

            // Initialize MCP API Client
            const apiClient = new MCPApiClient('/api', vscode);
            window.apiClient = apiClient;

            // Application State
            const appState = {
                currentView: 'tree',
                selectedItem: null,
                filters: {}
            };

            async function initializeApp() {
                try {
                    console.log('Initializing AI Command Center...');

                    // Load components
                    await loadComponents();

                    // Initialize components
                    await initializeComponents();

                    // Hide loading screen
                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('app').style.display = 'flex';

                    console.log('AI Command Center initialized successfully');

                } catch (error) {
                    console.error('Failed to initialize application:', error);
                    showError('Failed to load application. Please refresh.');
                }
            }

            async function loadComponents() {
                const loader = window.componentLoader;

                // Load toolbar
                await loader.load('toolbar', document.getElementById('toolbar'));

                // Load planning tree
                await loader.load('planning-tree', document.getElementById('sidebar'));

                console.log('Components loaded');
            }

            async function initializeComponents() {
                // Initialize Planning Tree
                const treeContainer = document.getElementById('sidebar');
                if (treeContainer && window.PlanningTreeComponent) {
                    window.planningTree = new PlanningTreeComponent(treeContainer, apiClient);

                    // Listen to tree events
                    window.planningTree.on('nodeSelected', (data) => {
                        console.log('Node selected:', data);
                        appState.selectedItem = data;
                        loadDetailsPanel(data);
                    });

                    window.planningTree.on('nodeEdit', (data) => {
                        console.log('Edit node:', data);
                        showEditDialog(data);
                    });

                    window.planningTree.on('createEpic', () => {
                        showCreateEpicDialog();
                    });

                    window.planningTree.on('addChild', (data) => {
                        showAddChildDialog(data);
                    });
                }
            }

            async function loadDetailsPanel(item) {
                const detailsPanel = document.getElementById('details-panel');
                if (!detailsPanel) return;

                try {
                    let data;
                    if (item.type === 'epic') {
                        data = await apiClient.getEpic(item.id);
                    } else if (item.type === 'story') {
                        // Would need parent epic ID
                        console.log('Load story details for:', item.id);
                    } else if (item.type === 'task') {
                        // Would need parent story and epic IDs
                        console.log('Load task details for:', item.id);
                    }

                    // Render details
                    detailsPanel.innerHTML = `
                        <div class="card">
                            <div class="card-header">
                                <h5>${item.type.toUpperCase()}: ${data?.title || item.id}</h5>
                            </div>
                            <div class="card-body">
                                <pre>${JSON.stringify(data, null, 2)}</pre>
                            </div>
                        </div>
                    `;
                } catch (error) {
                    console.error('Failed to load details:', error);
                }
            }

            function showEditDialog(item) {
                // Placeholder - would show a modal dialog
                console.log('Show edit dialog for:', item);
            }

            function showCreateEpicDialog() {
                // Placeholder - would show a modal dialog
                console.log('Show create epic dialog');
            }

            function showAddChildDialog(parent) {
                // Placeholder - would show a modal dialog
                console.log('Show add child dialog for:', parent);
            }

            function showError(message) {
                const loading = document.getElementById('loading');
                loading.innerHTML = `
                    <div class="alert alert-danger">
                        <i class="bi bi-exclamation-triangle"></i>
                        ${message}
                    </div>
                `;
            }

            // Start the application
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initializeApp);
            } else {
                initializeApp();
            }

        })();
    </script>
</body>
</html>
