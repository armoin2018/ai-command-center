<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src vscode-resource: https: data:; script-src vscode-resource: https:; style-src 'unsafe-inline' vscode-resource: https:; font-src vscode-resource: https:; connect-src vscode-resource: http://localhost:* https://localhost:* ws://localhost:* http://127.0.0.1:* https://127.0.0.1:* ws://127.0.0.1:*; frame-src http://localhost:* https://localhost:* http://127.0.0.1:* https://127.0.0.1:*;">
    <title>AI Command Center - Planning View</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Chart.js -->
    <link href="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.min.css" rel="stylesheet">
    
    <!-- Tabulator -->
    <link href="https://unpkg.com/tabulator-tables@5.5.0/dist/css/tabulator_bootstrap5.min.css" rel="stylesheet">
    
    <!-- Tagify -->
    <link href="https://cdn.jsdelivr.net/npm/@yaireo/tagify/dist/tagify.css" rel="stylesheet">
    
    <!-- Main Application Styles -->
    <link rel="stylesheet" href="/media/components/styles.css">
</head>
<body>
    <!-- Loading Screen -->
    <div id="loading" class="loading-screen">
        <div class="text-center">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-3">Loading AI Command Center...</p>
        </div>
    </div>

    <!-- Main Application -->
    <div id="app" class="d-none">
        <!-- Toolbar Component -->
        <div id="toolbar"></div>

        <!-- Main Content Area -->
        <div id="main-content">
            <!-- Sidebar with Planning Tree -->
            <div id="sidebar"></div>

            <!-- Content Area -->
            <div id="content-area" class="p-3">
                <div id="details-panel"></div>
            </div>
        </div>
    </div>

    <!-- External Libraries -->
    
    <!-- jQuery (required by Bootstrap) -->
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Lodash -->
    <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>
    
    <!-- Moment.js -->
    <script src="https://cdn.jsdelivr.net/npm/moment@2.29.4/moment.min.js"></script>
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.3.0/dist/chart.umd.js"></script>
    
    <!-- Tabulator -->
    <script src="https://unpkg.com/tabulator-tables@5.5.0/dist/js/tabulator.min.js"></script>
    
    <!-- Tagify -->
    <script src="https://cdn.jsdelivr.net/npm/@yaireo/tagify"></script>

    <!-- MCP API Client (TypeScript compiled to JS) -->
    <script src="/media/api/mcpClient.js"></script>
    
    <!-- Component Loader -->
    <script src="/media/lib/componentLoader.js"></script>

    <!-- Application Initialization -->
    <script src="/media/components/app.js"></script>
</body>
</html>
