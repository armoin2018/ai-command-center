<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src {{cspSource}} 'unsafe-inline'; script-src {{cspSource}} 'nonce-{{nonce}}'; font-src {{cspSource}} data:; img-src {{cspSource}} data:; connect-src {{cspSource}} http://localhost:* https://localhost:* ws://localhost:* http://127.0.0.1:* https://127.0.0.1:* ws://127.0.0.1:*; frame-src http://localhost:* https://localhost:* http://127.0.0.1:* https://127.0.0.1:*;">
  <title>AI Command Center - Secondary Panel</title>
  <style>
    @font-face {
      font-family: "codicon";
      font-display: block;
      src: url("{{codiconFontUri}}") format("truetype");
    }
  </style>
  <link rel="stylesheet" href="{{codiconCssUri}}">
  <link rel="stylesheet" href="{{stylesUri}}">
</head>
<body>
  <!-- Component Reference for Secondary Panel -->
  <div class="component-ref" id="panel-ref" data-ref="SECONDARY-PANEL">
    <span class="ref-badge">REF</span>
    <span>SECONDARY-PANEL</span>
  </div>
  
  <!-- Header Row -->
  <div class="header ref-container">
    <span class="header-title">AI Command Center</span>
    <span class="header-version" id="app-version"></span>
    <button class="header-btn" id="btn-dev-toggle" title="Show Developer Tabs" style="color:#ef4444">
      <span class="codicon codicon-eye-closed" id="dev-toggle-icon"></span>
    </button>
    <div class="header-actions">
      <button class="header-btn" id="btn-settings" title="Settings">
        <span class="codicon codicon-settings-gear"></span>
      </button>
      <button class="header-btn" id="btn-toggle-refs" title="Toggle Component References" data-dev-btn="true">
        <span class="codicon codicon-tag"></span>
      </button>
      <button class="header-btn" id="btn-debug" title="Debug" data-dev-btn="true">
        <span class="codicon codicon-bug"></span>
      </button>
      <button class="header-btn" id="btn-refresh" title="Reload Webviews" data-dev-btn="true">
        <span class="codicon codicon-refresh"></span>
      </button>
      <button class="header-btn" id="btn-help" title="Help">
        <span class="codicon codicon-question"></span>
      </button>
    </div>
  </div>
  
  <!-- Tabs Row -->
  <div class="tabs-row ref-container" id="tabs-container">
    <span class="component-ref" id="tabs-ref" data-ref="SEC-TABS">
      <span class="ref-badge">REF</span>
      <span>SEC-TABS</span>
    </span>
  </div>
  
  <!-- Body -->
  <div class="body ref-container">
    <div id="panel-content">
      <div class="loading">
        <span class="codicon codicon-loading codicon-modifier-spin"></span>
        <span>Loading...</span>
      </div>
    </div>
  </div>
  
  <!-- Footer Row -->
  <div class="footer">
    <select class="footer-select" id="agent-select">
      <option value="orchestrator" selected>AI-ley Orchestrator</option>
      <option value="architect">Architect</option>
      <option value="developer">Developer</option>
      <option value="reviewer">Reviewer</option>
      <option value="tester">Tester</option>
    </select>
    <div class="footer-center">
      <span class="footer-workspace" id="footer-workspace-info">
        <span class="codicon codicon-server-environment"></span>
        <span id="footer-ws-name">—</span>:<span id="footer-mcp-port">—</span>
      </span>
      <span class="footer-health disconnected" id="footer-health-indicator" title="MCP Disconnected">
        <span class="codicon codicon-circle-filled"></span>
      </span>
    </div>
    <div class="footer-actions">
      <button class="footer-btn success" id="btn-save-all" title="Save All Changes">
        <span class="codicon codicon-save"></span>
        Save All (<span id="changes-count">0</span>)
      </button>
      <button class="footer-btn primary" id="btn-run-next" title="Run Next Task">
        <span class="codicon codicon-play"></span>
        Run Next
      </button>
    </div>
  </div>
  
  <!-- Modal Container -->
  <div id="modal-overlay" class="modal-overlay" style="display:none;">
    <div id="modal-container" class="modal-container">
      <div class="modal-header">
        <span id="modal-title" class="modal-title"></span>
        <button class="modal-close" id="modal-close" aria-label="Close modal">
          <span class="codicon codicon-close"></span>
        </button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>
  
  <script nonce="{{nonce}}" src="{{actionsUri}}"></script>
  <script nonce="{{nonce}}" src="{{scriptUri}}"></script>
</body>
</html>
