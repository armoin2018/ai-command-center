# config-schema.yaml
$schema: http://json-schema.org/draft-07/schema#
title: Application Configuration Schema
type: object
required: [app, database, logging]
properties:
  app:
    type: object
    required: [name, port, environment]
    properties:
      name:
        type: string
        pattern: "^[a-z][a-z0-9-]*[a-z0-9]$"
        minLength: 3
        maxLength: 50
      port:
        type: integer
        minimum: 1024
        maximum: 65535
      environment:
        type: string
        enum: [development, staging, production]
      debug:
        type: boolean
        default: false
      features:
        type: object
        patternProperties:
          "^[a-z][a-zA-Z0-9]*$":
            type: boolean
    additionalProperties: false

  database:
    type: object
    required: [host, name]
    properties:
      host:
        type: string
        format: hostname
      port:
        type: integer
        minimum: 1
        maximum: 65535
        default: 5432
      name:
        type: string
        pattern: "^[a-zA-Z][a-zA-Z0-9_]*$"
      username:
        type: string
        minLength: 1
      password:
        type: string
        minLength: 8
      ssl:
        type: boolean
        default: true
      pool:
        type: object
        properties:
          min:
            type: integer
            minimum: 0
            default: 2
          max:
            type: integer
            minimum: 1
            default: 10
          timeout:
            type: integer
            minimum: 1000
            default: 30000
        additionalProperties: false
    additionalProperties: false

  logging:
    type: object
    required: [level]
    properties:
      level:
        type: string
        enum: [debug, info, warn, error]
        default: info
      format:
        type: string
        enum: [json, text]
        default: json
      outputs:
        type: array
        items:
          type: string
          enum: [console, file, syslog]
        minItems: 1
        uniqueItems: true
        default: [console]
      file:
        type: object
        properties:
          path:
            type: string
            pattern: "^(/[^/ ]*)+/?$"
          maxSize:
            type: string
            pattern: "^[0-9]+[KMGT]?B?$"
          maxBackups:
            type: integer
            minimum: 0
            default: 10
          maxAge:
            type: integer
            minimum: 1
            default: 30
        additionalProperties: false
    additionalProperties: false

  cache:
    type: object
    properties:
      enabled:
        type: boolean
        default: true
      provider:
        type: string
        enum: [redis, memory, memcached]
        default: redis
      ttl:
        type: integer
        minimum: 1
        default: 3600
      redis:
        type: object
        properties:
          host:
            type: string
            format: hostname
          port:
            type: integer
            minimum: 1
            maximum: 65535
            default: 6379
          db:
            type: integer
            minimum: 0
            maximum: 15
            default: 0
        additionalProperties: false
    additionalProperties: false

additionalProperties: false