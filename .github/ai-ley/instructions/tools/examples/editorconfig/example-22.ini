# Language-specific advanced configurations

# Python with PEP 8 compliance
[*.{py,pyi,pyw}]
indent_style = space
indent_size = 4
max_line_length = 88
trim_trailing_whitespace = true

# Go with standard formatting
[*.go]
indent_style = tab
indent_size = 4
max_line_length = 120

# Rust formatting
[*.rs]
indent_style = space
indent_size = 4
max_line_length = 100

# Java/Kotlin enterprise standards
[*.{java,kt,kts}]
indent_style = space
indent_size = 4
max_line_length = 120

# C/C++ with specific style
[*.{c,cpp,cc,cxx,h,hpp}]
indent_style = space
indent_size = 4
max_line_length = 100

# Ruby conventions
[*.{rb,rake,gemspec}]
indent_style = space
indent_size = 2
max_line_length = 120

# PHP standards
[*.{php,phtml}]
indent_style = space
indent_size = 4
max_line_length = 120