# .gitattributes - Coordinates with EditorConfig
* text=auto eol=lf

# Binary files
*.png binary
*.jpg binary
*.pdf binary

# Text files with specific handling
*.md text eol=lf
*.sh text eol=lf
*.bat text eol=crlf
*.ps1 text eol=crlf

# Generated files
package-lock.json linguist-generated=true
yarn.lock linguist-generated=true