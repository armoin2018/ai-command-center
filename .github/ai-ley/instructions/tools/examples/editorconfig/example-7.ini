# .editorconfig - Root configuration file

# Indicate this is the root EditorConfig file
root = true

# All files
[*]
charset = utf-8
end_of_line = lf
insert_final_newline = true
trim_trailing_whitespace = true
indent_style = space
indent_size = 2

# Override for specific file types
[*.{js,jsx,ts,tsx}]
indent_size = 2

[*.{py,pyi}]
indent_size = 4

[*.{java,kotlin,scala}]
indent_size = 4

[*.{go}]
indent_style = tab
indent_size = 4

[*.{yaml,yml}]
indent_size = 2

[*.{md,markdown}]
trim_trailing_whitespace = false

[*.{bat,cmd}]
end_of_line = crlf

[Makefile]
indent_style = tab