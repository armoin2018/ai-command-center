# .editorconfig - Comprehensive multi-language setup

root = true

# Default settings for all files
[*]
charset = utf-8
end_of_line = lf
insert_final_newline = true
trim_trailing_whitespace = true
indent_style = space
indent_size = 2

# Web Development
[*.{html,htm,xhtml}]
indent_size = 2

[*.{css,scss,sass,less,styl}]
indent_size = 2

[*.{js,jsx,mjs,cjs}]
indent_size = 2

[*.{ts,tsx}]
indent_size = 2

[*.{vue,svelte}]
indent_size = 2

# Backend Languages
[*.{py,pyi,pyw}]
indent_size = 4
max_line_length = 88

[*.{java,kt,kts}]
indent_size = 4

[*.{cs,vb}]
indent_size = 4

[*.{php,phtml}]
indent_size = 4

[*.{rb,rake,gemspec}]
indent_size = 2

[*.go]
indent_style = tab
indent_size = 4

[*.rs]
indent_size = 4

[*.{c,cpp,cc,cxx,h,hpp}]
indent_size = 4

# Data and Configuration
[*.{json,jsonc}]
indent_size = 2

[*.{yaml,yml}]
indent_size = 2

[*.{xml,xsd,xsl,xslt}]
indent_size = 2

[*.{toml,ini,cfg}]
indent_size = 4

# Documentation
[*.{md,markdown,mdown,mkd}]
trim_trailing_whitespace = false
indent_size = 2

[*.{rst,txt}]
indent_size = 4

# Database
[*.sql]
indent_size = 2

# Shell scripts
[*.{sh,bash,zsh,fish}]
indent_size = 2

[*.{ps1,psm1,psd1}]
indent_size = 4

# Windows specific
[*.{bat,cmd}]
end_of_line = crlf
indent_size = 4

# Build files
[{Makefile,makefile,GNUmakefile}]
indent_style = tab
indent_size = 4

[*.{gradle,groovy}]
indent_size = 4

[{CMakeLists.txt,*.cmake}]
indent_size = 2

# Docker
[{Dockerfile,*.dockerfile}]
indent_size = 2

# Version control
[.gitignore]
indent_size = 2

[.gitattributes]
indent_size = 2