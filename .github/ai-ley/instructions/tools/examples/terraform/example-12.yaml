# .github/workflows/terraform-enterprise.yml - Enterprise CI/CD pipeline
name: Terraform Enterprise Pipeline

on:
  push:
    branches: [main, develop]
    paths:
      - 'terraform/**'
      - '.github/workflows/terraform-enterprise.yml'
  pull_request:
    branches: [main]
    paths:
      - 'terraform/**'

env:
  TF_VERSION: '1.6.0'
  TF_LOG: INFO
  AWS_DEFAULT_REGION: us-west-2

jobs:
  validate:
    name: Validate & Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: |
          cd terraform
          terraform init -backend=false
          terraform validate

      - name: tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: v0.48.0

      - name: Run tflint
        run: |
          cd terraform
          tflint --init
          tflint

      - name: Checkov Security Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform/
          framework: terraform
          output_format: sarif
          output_file_path: checkov-results.sarif

      - name: Upload Checkov results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: checkov-results.sarif

      - name: Terrascan Security Scan
        uses: tenable/terrascan-action@v1
        with:
          iac_type: terraform
          iac_dir: terraform/
          policy_type: aws
          only_warn: true

  plan:
    name: Plan Infrastructure Changes
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'pull_request'

    strategy:
      matrix:
        environment: [dev, staging]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: terraform-${{ matrix.environment }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Terraform Plan
        run: |
          cd terraform
          terraform init
          terraform workspace select ${{ matrix.environment }} || terraform workspace new ${{ matrix.environment }}
          terraform plan -var-file="environments/${{ matrix.environment }}/terraform.tfvars" -out=${{ matrix.environment }}.tfplan

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v3
        with:
          name: tfplan-${{ matrix.environment }}
          path: terraform/${{ matrix.environment }}.tfplan
          retention-days: 5

  deploy_dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/develop'
    environment: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          cli_config_credentials_token: ${{ secrets.TF_CLOUD_TOKEN }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE }}
          role-session-name: terraform-dev
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Terraform Apply
        run: |
          cd terraform
          terraform init
          terraform workspace select dev || terraform workspace new dev
          terraform apply -var-file="environments/dev/terraform.tfvars" -auto-approve

      - name: Infrastructure Tests
        run: |
          cd tests
          python -m pytest infrastructure_tests.py -v

  deploy_staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: deploy_dev
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging
        run: |
          cd terraform
          terraform init
          terraform workspace select staging || terraform workspace new staging
          terraform apply -var-file="environments/staging/terraform.tfvars" -auto-approve

  deploy_production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy_staging
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Manual Approval Required
        uses: trstringer/manual-approval@v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: infrastructure-team,security-team
          minimum-approvals: 2

      - name: Production Deployment
        run: |
          cd terraform
          terraform init
          terraform workspace select prod || terraform workspace new prod
          terraform plan -var-file="environments/prod/terraform.tfvars" -out=prod.tfplan
          terraform apply prod.tfplan