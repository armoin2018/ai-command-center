# netlify.toml - Large Media configuration
[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# Large Media settings
[large_media]
  track_files = ["*.jpg", "*.png", "*.gif", "*.pdf", "*.zip"]

# Image optimization
[[plugins]]
  package = "@netlify/plugin-nextjs"

[[plugins]]
  package = "netlify-plugin-image-optim"