# netlify.toml - Main configuration file

[build]
  # Build command
  command = "npm run build"

  # Directory to publish (build output)
  publish = "dist"

  # Base directory for build
  base = "."

  # Environment variables for build
  environment = { NODE_VERSION = "18", YARN_VERSION = "1.22.19" }

# Production deploy settings
[build.production]
  command = "npm run build:prod"
  publish = "dist"

# Deploy preview settings (pull requests)
[build.deploy-preview]
  command = "npm run build:preview"
  publish = "dist"

# Branch deploy settings
[build.branch-deploy]
  command = "npm run build:dev"
  publish = "dist"

# Redirect rules
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  conditions = {Role = ["admin"], Country = ["US"]}

# Header rules
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"
    Content-Security-Policy = "default-src 'self'"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Edge Functions
[[edge_functions]]
  function = "geolocation"
  path = "/api/location"

# Plugin configuration
[[plugins]]
  package = "@netlify/plugin-nextjs"

[[plugins]]
  package = "netlify-plugin-cypress"
  [plugins.inputs]
    enable = true

# Environment-specific settings
[context.production.environment]
  NODE_ENV = "production"
  REACT_APP_API_URL = "https://api.yoursite.com"

[context.deploy-preview.environment]
  NODE_ENV = "staging"
  REACT_APP_API_URL = "https://staging-api.yoursite.com"

[context.branch-deploy.environment]
  NODE_ENV = "development"
  REACT_APP_API_URL = "https://dev-api.yoursite.com"