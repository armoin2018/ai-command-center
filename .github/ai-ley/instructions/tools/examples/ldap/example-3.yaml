# ldap-cluster-k8s.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: ldap-config
data:
  slapd.conf: |
    # OpenLDAP Security-Hardened Configuration
    include /etc/ldap/schema/core.schema
    include /etc/ldap/schema/cosine.schema
    include /etc/ldap/schema/nis.schema
    include /etc/ldap/schema/inetorgperson.schema

    # Process ID and arguments files
    pidfile /var/run/openldap/slapd.pid
    argsfile /var/run/openldap/slapd.args

    # Load dynamic backend modules
    modulepath /usr/lib/ldap
    moduleload back_mdb.la
    moduleload syncprov.la
    moduleload accesslog.la
    moduleload auditlog.la

    # SSL/TLS Configuration
    TLSCertificateFile /etc/ldap/ssl/server.crt
    TLSCertificateKeyFile /etc/ldap/ssl/server.key
    TLSCACertificateFile /etc/ldap/ssl/ca.crt
    TLSCipherSuite HIGH:MEDIUM:!aNULL:!MD5:!RC4
    TLSProtocolMin 3.3
    TLSVerifyClient demand

    # Security Settings
    security ssf=128
    require authc
    disallow bind_anon

    # Logging for security audit
    loglevel stats sync config

    # Access Control Lists
    access to attrs=userPassword
        by self write
        by anonymous auth
        by group.exact="cn=admin,ou=groups,dc=company,dc=com" write
        by * none

    access to attrs=shadowLastChange
        by self write
        by * read

    access to *
        by group.exact="cn=admin,ou=groups,dc=company,dc=com" write
        by users read
        by * none

    # Database Configuration
    database mdb
    suffix "dc=company,dc=com"
    rootdn "cn=admin,dc=company,dc=com"
    rootpw {SSHA}generated_password_hash

    directory /var/lib/openldap
    maxsize 1073741824

    # Indexes for performance
    index objectClass eq
    index cn eq,sub
    index uid eq
    index uidNumber eq
    index gidNumber eq
    index memberUid eq
    index mail eq,sub
    index entryCSN eq
    index entryUUID eq

    # Replication Configuration
    overlay syncprov
    syncprov-checkpoint 100 10
    syncprov-sessionlog 100

    # Audit Logging
    overlay auditlog
    auditlog /var/log/openldap/audit.log

    # Access Log for Security Monitoring
    database mdb
    suffix "cn=accesslog"
    rootdn "cn=accesslog"
    directory /var/lib/openldap/accesslog
    maxsize 104857600

    index default eq
    index entryCSN,objectClass,reqEnd,reqResult,reqStart

    overlay accesslog
    logdb cn=accesslog
    logops writes
    logold (objectclass=person)
    logpurge 30+00:00 1+00:00

---
apiVersion: v1
kind: Secret
metadata:
  name: ldap-secrets
type: Opaque
data:
  admin-password: YWRtaW5fcGFzc3dvcmQ= # admin_password (base64)
  config-password: Y29uZmlnX3Bhc3N3b3Jk # config_password (base64)

---
apiVersion: v1
kind: Secret
metadata:
  name: ldap-tls
type: kubernetes.io/tls
data:
  tls.crt: LS0tLS1CRUdJTi... # Base64 encoded certificate
  tls.key: LS0tLS1CRUdJTi... # Base64 encoded private key
  ca.crt: LS0tLS1CRUdJTi... # Base64 encoded CA certificate

---
apiVersion: v1
kind: Service
metadata:
  name: ldap-service
  labels:
    app: ldap
spec:
  ports:
    - port: 389
      name: ldap
    - port: 636
      name: ldaps
  clusterIP: None
  selector:
    app: ldap

---
apiVersion: v1
kind: Service
metadata:
  name: ldap-lb
  labels:
    app: ldap
spec:
  type: LoadBalancer
  ports:
    - port: 389
      targetPort: 389
      name: ldap
    - port: 636
      targetPort: 636
      name: ldaps
  selector:
    app: ldap

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: ldap
spec:
  serviceName: ldap-service
  replicas: 3
  selector:
    matchLabels:
      app: ldap
  template:
    metadata:
      labels:
        app: ldap
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '9115'
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: ldap
          image: osixia/openldap:latest
          ports:
            - containerPort: 389
              name: ldap
            - containerPort: 636
              name: ldaps
          env:
            - name: LDAP_ORGANISATION
              value: 'Company Inc'
            - name: LDAP_DOMAIN
              value: 'company.com'
            - name: LDAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ldap-secrets
                  key: admin-password
            - name: LDAP_CONFIG_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ldap-secrets
                  key: config-password
            - name: LDAP_TLS
              value: 'true'
            - name: LDAP_TLS_VERIFY_CLIENT
              value: 'demand'
            - name: LDAP_TLS_PROTOCOL_MIN
              value: '3.3'
            - name: LDAP_TLS_CIPHER_SUITE
              value: 'HIGH:MEDIUM:!aNULL:!MD5:!RC4'
          volumeMounts:
            - name: ldap-data
              mountPath: /var/lib/ldap
            - name: ldap-config
              mountPath: /etc/ldap/slapd.d
            - name: ldap-tls
              mountPath: /container/service/slapd/assets/certs
              readOnly: true
            - name: ldap-logs
              mountPath: /var/log/openldap
          resources:
            requests:
              memory: '512Mi'
              cpu: '250m'
            limits:
              memory: '1Gi'
              cpu: '500m'
          livenessProbe:
            tcpSocket:
              port: 389
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            exec:
              command:
                - ldapsearch
                - -x
                - -H
                - ldap://localhost:389
                - -b
                - ''
                - -s
                - base
                - '(objectclass=*)'
            initialDelaySeconds: 10
            periodSeconds: 10

        # Security Monitoring Sidecar
        - name: security-monitor
          image: prom/node-exporter:latest
          ports:
            - containerPort: 9100
              name: metrics
          volumeMounts:
            - name: ldap-logs
              mountPath: /var/log/openldap
              readOnly: true
          resources:
            requests:
              memory: '64Mi'
              cpu: '50m'
            limits:
              memory: '128Mi'
              cpu: '100m'

      volumes:
        - name: ldap-tls
          secret:
            secretName: ldap-tls
        - name: ldap-logs
          emptyDir: {}

  volumeClaimTemplates:
    - metadata:
        name: ldap-data
      spec:
        accessModes: ['ReadWriteOnce']
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 10Gi
    - metadata:
        name: ldap-config
      spec:
        accessModes: ['ReadWriteOnce']
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 1Gi

---
# Security Monitoring and Alerting
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-ldap-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 30s
      evaluation_interval: 30s

    rule_files:
      - "/etc/prometheus/ldap-alerts.yml"

    scrape_configs:
      - job_name: 'ldap-nodes'
        static_configs:
          - targets: ['ldap-0:9100', 'ldap-1:9100', 'ldap-2:9100']
        metrics_path: /metrics
        scrape_interval: 30s

    alerting:
      alertmanagers:
        - static_configs:
            - targets: ['alertmanager:9093']

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ldap-security-audit
spec:
  schedule: '0 2 * * *' # Daily at 2 AM
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: security-audit
              image: alpine:latest
              command:
                - sh
                - -c
                - |
                  apk add --no-cache openldap-clients

                  # Security audit script
                  echo "LDAP Security Audit - $(date)"

                  # Check for unused accounts
                  ldapsearch -x -H ldap://ldap-service:389 \
                    -D "cn=admin,dc=company,dc=com" \
                    -w "$LDAP_ADMIN_PASSWORD" \
                    -b "ou=people,dc=company,dc=com" \
                    "(lastLogonTimestamp<=$(date -d '90 days ago' +%Y%m%d%H%M%S)Z)" \
                    dn > /tmp/unused_accounts.txt

                  # Check for accounts without password expiry
                  ldapsearch -x -H ldap://ldap-service:389 \
                    -D "cn=admin,dc=company,dc=com" \
                    -w "$LDAP_ADMIN_PASSWORD" \
                    -b "ou=people,dc=company,dc=com" \
                    "(&(objectClass=person)(!(passwordExpirationTime=*)))" \
                    dn > /tmp/no_expiry_accounts.txt

                  # Check for privileged accounts
                  ldapsearch -x -H ldap://ldap-service:389 \
                    -D "cn=admin,dc=company,dc=com" \
                    -w "$LDAP_ADMIN_PASSWORD" \
                    -b "ou=groups,dc=company,dc=com" \
                    "(cn=admin)" member > /tmp/admin_members.txt

                  echo "Security audit completed. Results stored in /tmp/"
              env:
                - name: LDAP_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: ldap-secrets
                      key: admin-password
              volumeMounts:
                - name: audit-logs
                  mountPath: /tmp
          volumes:
            - name: audit-logs
              persistentVolumeClaim:
                claimName: ldap-audit-pvc
          restartPolicy: OnFailure