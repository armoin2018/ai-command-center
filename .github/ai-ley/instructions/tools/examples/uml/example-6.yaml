# Enterprise UML Platform Configuration
uml_platform:
  version: '2.0.0'
  name: 'Enterprise UML Platform'

  # Model Repository Configuration
  repository:
    type: 'git'
    url: 'https://git.enterprise.com/architecture/models'
    branch: 'main'
    sync_interval: '5m'
    backup_enabled: true
    backup_retention: '90d'

  # Code Generation Configuration
  code_generation:
    enabled: true
    languages: ['java', 'typescript', 'python', 'csharp', 'go']
    templates_path: './templates'
    output_path: './generated'

    java:
      base_package: 'com.enterprise'
      spring_boot_version: '3.2.0'
      enterprise_patterns: true
      security_annotations: true
      validation_framework: 'jakarta'

    typescript:
      target: 'ES2022'
      module: 'ESNext'
      strict: true
      api_client_framework: 'axios'
      retry_logic: true

    python:
      version: '3.11'
      framework: 'fastapi'
      orm: 'sqlalchemy'
      validation: 'pydantic'
      async_support: true

  # Validation Configuration
  validation:
    enabled: true
    naming_conventions:
      class_names: 'PascalCase'
      method_names: 'camelCase'
      attribute_names: 'camelCase'
      constant_names: 'UPPER_SNAKE_CASE'

    architecture_rules:
      - 'Services must not depend on Controllers'
      - 'Entities must not depend on Services'
      - 'Repositories must extend BaseRepository'
      - 'All public methods must have documentation'

    quality_gates:
      min_documentation_coverage: 80
      max_cyclomatic_complexity: 10
      max_coupling: 7
      min_cohesion: 0.7

  # Collaboration Configuration
  collaboration:
    enabled: true
    real_time_editing: true
    conflict_resolution: 'three_way_merge'

    notifications:
      email: true
      slack: true
      teams: true

    review_process:
      required_reviewers: 2
      auto_merge_threshold: 0.95
      review_timeout: '48h'

  # Security Configuration
  security:
    authentication:
      type: 'oauth2'
      provider: 'azure_ad'
      scopes: ['read', 'write', 'admin']

    authorization:
      rbac_enabled: true
      roles: ['viewer', 'modeler', 'architect', 'admin']

    audit:
      enabled: true
      log_all_actions: true
      retention_period: '7y'
      compliance_reports: ['SOX', 'GDPR', 'HIPAA']

  # Integration Configuration
  integrations:
    ide:
      vscode_extension: true
      intellij_plugin: true
      eclipse_plugin: true

    ci_cd:
      jenkins: true
      github_actions: true
      azure_devops: true
      gitlab_ci: true

    tools:
      jira: true
      confluence: true
      teams: true
      slack: true

    apis:
      rest_api: true
      graphql_api: true
      webhook_support: true

  # Monitoring Configuration
  monitoring:
    enabled: true
    metrics:
      - 'model_validation_time'
      - 'code_generation_time'
      - 'user_activity'
      - 'model_complexity_score'
      - 'collaboration_metrics'

    alerting:
      validation_failures: true
      generation_errors: true
      performance_degradation: true
      security_violations: true

    dashboards:
      grafana_enabled: true
      prometheus_metrics: true
      custom_dashboards: ['architecture_overview', 'team_productivity', 'quality_metrics']

  # Performance Configuration
  performance:
    caching:
      enabled: true
      redis_url: 'redis://cache.enterprise.com:6379'
      cache_ttl: '1h'

    optimization:
      lazy_loading: true
      model_indexing: true
      incremental_generation: true
      parallel_processing: true

    scaling:
      horizontal_scaling: true
      load_balancer: true
      auto_scaling_enabled: true
      max_instances: 10