# mariadb-galera-cluster.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: mariadb-galera-config
data:
  galera.cnf: |
    [mariadb]
    bind-address = 0.0.0.0
    port = 3306

    # InnoDB Configuration
    innodb_buffer_pool_size = 1G
    innodb_log_file_size = 256M
    innodb_log_buffer_size = 64M
    innodb_flush_log_at_trx_commit = 1
    innodb_file_per_table = 1

    # Galera Cluster Configuration
    wsrep_on = ON
    wsrep_provider = /usr/lib/galera/libgalera_smm.so
    wsrep_cluster_name = "k8s_galera_cluster"
    wsrep_cluster_address = "gcomm://mariadb-galera-0.mariadb-galera,mariadb-galera-1.mariadb-galera,mariadb-galera-2.mariadb-galera"
    wsrep_sst_method = rsync
    wsrep_provider_options = "gcache.size=512M"

    # Performance settings
    max_connections = 200
    thread_cache_size = 16
    table_open_cache = 4000

    # Logging
    slow_query_log = 1
    long_query_time = 2
    log_error = /var/log/mysql/error.log

---
apiVersion: v1
kind: Service
metadata:
  name: mariadb-galera
  labels:
    app: mariadb-galera
spec:
  ports:
    - port: 3306
      name: mysql
    - port: 4444
      name: sst
    - port: 4567
      name: replication
    - port: 4568
      name: ist
  clusterIP: None
  selector:
    app: mariadb-galera

---
apiVersion: v1
kind: Service
metadata:
  name: mariadb-galera-lb
  labels:
    app: mariadb-galera
spec:
  type: LoadBalancer
  ports:
    - port: 3306
      targetPort: 3306
      name: mysql
  selector:
    app: mariadb-galera

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mariadb-galera
spec:
  serviceName: mariadb-galera
  replicas: 3
  selector:
    matchLabels:
      app: mariadb-galera
  template:
    metadata:
      labels:
        app: mariadb-galera
    spec:
      containers:
        - name: mariadb
          image: mariadb:11.2
          ports:
            - containerPort: 3306
              name: mysql
            - containerPort: 4444
              name: sst
            - containerPort: 4567
              name: replication
            - containerPort: 4568
              name: ist
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: root-password
            - name: MYSQL_DATABASE
              value: 'app_db'
            - name: MYSQL_USER
              value: 'app_user'
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mariadb-secret
                  key: user-password
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
            - name: mysql-config
              mountPath: /etc/mysql/mariadb.conf.d
            - name: mysql-logs
              mountPath: /var/log/mysql
          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - -h
                - localhost
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command:
                - mysql
                - -h
                - localhost
                - -u
                - root
                - -p$(MYSQL_ROOT_PASSWORD)
                - -e
                - 'SELECT 1'
            initialDelaySeconds: 5
            periodSeconds: 2
            timeoutSeconds: 1
          resources:
            requests:
              memory: '1Gi'
              cpu: '500m'
            limits:
              memory: '2Gi'
              cpu: '1000m'
      volumes:
        - name: mysql-config
          configMap:
            name: mariadb-galera-config
        - name: mysql-logs
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: mysql-data
      spec:
        accessModes: ['ReadWriteOnce']
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 20Gi

---
apiVersion: v1
kind: Secret
metadata:
  name: mariadb-secret
type: Opaque
data:
  root-password: c2VjdXJlX3Jvb3RfcGFzc3dvcmQ= # secure_root_password
  user-password: YXBwX3Bhc3N3b3Jk # app_password

---
# Backup CronJob
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mariadb-backup
spec:
  schedule: '0 2 * * *' # Daily at 2 AM
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: backup
              image: mariadb:11.2
              command:
                - sh
                - -c
                - |
                  timestamp=$(date +%Y%m%d_%H%M%S)
                  echo "Starting backup at $timestamp"

                  # Create backup using mariabackup
                  mariabackup --backup --target-dir=/backups/backup_$timestamp \
                    --host=mariadb-galera-0.mariadb-galera \
                    --user=root --password=$MYSQL_ROOT_PASSWORD

                  # Prepare backup
                  mariabackup --prepare --target-dir=/backups/backup_$timestamp

                  # Compress backup
                  tar -czf /backups/backup_$timestamp.tar.gz -C /backups backup_$timestamp
                  rm -rf /backups/backup_$timestamp

                  # Clean old backups (keep 7 days)
                  find /backups -name "*.tar.gz" -mtime +7 -delete

                  echo "Backup completed: backup_$timestamp.tar.gz"
              env:
                - name: MYSQL_ROOT_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mariadb-secret
                      key: root-password
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: mariadb-backup-pvc
          restartPolicy: OnFailure

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mariadb-backup-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  storageClassName: standard