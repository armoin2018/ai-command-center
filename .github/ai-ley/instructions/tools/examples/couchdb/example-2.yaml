# Enterprise CouchDB Production Deployment
# Generated: {timestamp}

version: '3.8'

services:
  couchdb-primary:
    image: couchdb:3.3
    container_name: couchdb-primary
    restart: unless-stopped
    ports:
      - "5984:5984"
      - "4369:4369"  # Erlang port mapper
      - "9100:9100"  # Cluster port
    volumes:
      - ./primary_data:/opt/couchdb/data
      - ./primary_config:/opt/couchdb/etc/local.d
      - ./logs:/opt/couchdb/var/log
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=${COUCHDB_ADMIN_PASSWORD}
      - COUCHDB_SECRET=${COUCHDB_SECRET}
      - NODENAME=couchdb-primary
      - COUCHDB_ERLANG_COOKIE=${ERLANG_COOKIE}
      - ERL_FLAGS=-setcookie ${ERLANG_COOKIE}
    networks:
      - couchdb-cluster
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G

  couchdb-replica1:
    image: couchdb:3.3
    container_name: couchdb-replica1
    restart: unless-stopped
    ports:
      - "5985:5984"
      - "4370:4369"
      - "9101:9100"
    volumes:
      - ./replica1_data:/opt/couchdb/data
      - ./replica1_config:/opt/couchdb/etc/local.d
      - ./logs:/opt/couchdb/var/log
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=${COUCHDB_ADMIN_PASSWORD}
      - COUCHDB_SECRET=${COUCHDB_SECRET}
      - NODENAME=couchdb-replica1
      - COUCHDB_ERLANG_COOKIE=${ERLANG_COOKIE}
      - ERL_FLAGS=-setcookie ${ERLANG_COOKIE}
    networks:
      - couchdb-cluster
    depends_on:
      - couchdb-primary
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  couchdb-replica2:
    image: couchdb:3.3
    container_name: couchdb-replica2
    restart: unless-stopped
    ports:
      - "5986:5984"
      - "4371:4369"
      - "9102:9100"
    volumes:
      - ./replica2_data:/opt/couchdb/data
      - ./replica2_config:/opt/couchdb/etc/local.d
      - ./logs:/opt/couchdb/var/log
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=${COUCHDB_ADMIN_PASSWORD}
      - COUCHDB_SECRET=${COUCHDB_SECRET}
      - NODENAME=couchdb-replica2
      - COUCHDB_ERLANG_COOKIE=${ERLANG_COOKIE}
      - ERL_FLAGS=-setcookie ${ERLANG_COOKIE}
    networks:
      - couchdb-cluster
    depends_on:
      - couchdb-primary
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5984/_up"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  haproxy:
    image: haproxy:2.8
    container_name: couchdb-haproxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # HAProxy stats
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./haproxy/ssl:/etc/ssl/private:ro
    depends_on:
      - couchdb-primary
      - couchdb-replica1
      - couchdb-replica2
    networks:
      - couchdb-cluster

  prometheus:
    image: prom/prometheus:latest
    container_name: couchdb-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - couchdb-cluster

  grafana:
    image: grafana/grafana:latest
    container_name: couchdb-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel
    networks:
      - couchdb-cluster

volumes:
  prometheus_data:
  grafana_data:

networks:
  couchdb-cluster:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16