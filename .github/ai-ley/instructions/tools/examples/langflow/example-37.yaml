# kubernetes-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: langflow-deployment
  labels:
    app: langflow
spec:
  replicas: 3
  selector:
    matchLabels:
      app: langflow
  template:
    metadata:
      labels:
        app: langflow
    spec:
      containers:
        - name: langflow
          image: langflow/langflow:latest
          ports:
            - containerPort: 7860
          env:
            - name: LANGFLOW_HOST
              value: '0.0.0.0'
            - name: LANGFLOW_PORT
              value: '7860'
            - name: LANGFLOW_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: langflow-secrets
                  key: database-url
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: langflow-secrets
                  key: openai-api-key
          resources:
            requests:
              memory: '1Gi'
              cpu: '500m'
            limits:
              memory: '2Gi'
              cpu: '1000m'
          livenessProbe:
            httpGet:
              path: /health
              port: 7860
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /ready
              port: 7860
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: langflow-service
spec:
  selector:
    app: langflow
  ports:
    - protocol: TCP
      port: 80
      targetPort: 7860
  type: LoadBalancer

---
apiVersion: v1
kind: Secret
metadata:
  name: langflow-secrets
type: Opaque
data:
  database-url: cG9zdGdyZXNxbDovL3VzZXI6cGFzc0Bwb3N0Z3JlczozNTQzMi9sYW5nZmxvdw==
  openai-api-key: c2stWU9VUl9BUElfS0VZX0hFUkU=