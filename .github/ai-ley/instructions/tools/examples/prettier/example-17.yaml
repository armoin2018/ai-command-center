# GitHub Actions workflow
name: Code Quality
on: [push, pull_request]
jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm ci
      - run: npm run format:check
        name: Check Prettier formatting
      - run: npm run lint
        name: Run ESLint