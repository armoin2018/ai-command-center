# docker-compose-owasp-security.yml - Comprehensive Security Stack
version: '3.8'

services:
  # OWASP ZAP Security Scanner
  owasp-zap:
    image: owasp/zap2docker-stable:latest
    container_name: owasp-zap-scanner
    command: |
      zap-webswing.sh
    ports:
      - '8080:8080'
      - '8090:8090'
    volumes:
      - ./zap-data:/zap/wrk:rw
      - ./zap-scripts:/zap/scripts:ro
    environment:
      - ZAP_PORT=8080
      - ZAP_PROXY_PORT=8090
    networks:
      - security_network

  # OWASP Dependency Check
  dependency-check:
    image: owasp/dependency-check:latest
    container_name: owasp-dependency-check
    volumes:
      - ./src:/src:ro
      - ./dependency-check-data:/usr/share/dependency-check/data
      - ./reports:/reports
    command: |
      --scan /src
      --format ALL
      --out /reports
      --enableRetired
      --enableExperimental
    networks:
      - security_network

  # Security Code Analysis with SonarQube
  sonarqube:
    image: sonarqube:9.9-community
    container_name: security-sonarqube
    environment:
      - SONAR_ES_BOOTSTRAP_CHECKS_DISABLE=true
      - SONAR_JDBC_URL=jdbc:postgresql://postgres:5432/sonarqube
      - SONAR_JDBC_USERNAME=sonar
      - SONAR_JDBC_PASSWORD_FILE=/run/secrets/sonar_db_password
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    ports:
      - '9000:9000'
    networks:
      - security_network
    secrets:
      - sonar_db_password
    depends_on:
      - postgres

  # Security Information and Event Management (SIEM)
  security-siem:
    image: elastic/elasticsearch:8.8.0
    container_name: security-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=true
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      - 'ES_JAVA_OPTS=-Xms1g -Xmx1g'
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    ports:
      - '9200:9200'
    networks:
      - security_network

  # Security Dashboard
  kibana:
    image: elastic/kibana:8.8.0
    container_name: security-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://security-siem:9200
      - ELASTICSEARCH_USERNAME=elastic
      - ELASTICSEARCH_PASSWORD=${ELASTIC_PASSWORD}
      - SERVER_NAME=security-dashboard
    volumes:
      - ./kibana.yml:/usr/share/kibana/config/kibana.yml:ro
      - ./security-dashboards:/usr/share/kibana/dashboards:ro
    ports:
      - '5601:5601'
    networks:
      - security_network
    depends_on:
      - security-siem

  # Vulnerability Scanner
  twistlock-scanner:
    image: alpine:3.20
    container_name: twistlock-vulnerability-scanner
    environment:
      - PRISMA_CLOUD_CONSOLE_URL=${PRISMA_CLOUD_CONSOLE_URL}
      - PRISMA_CLOUD_USER=${PRISMA_CLOUD_USER}
      - PRISMA_CLOUD_PASSWORD=${PRISMA_CLOUD_PASSWORD}
    volumes:
      - ./src:/workspace:ro
      - ./vulnerability-reports:/reports
    command: >
      /bin/sh -c "apk add --no-cache curl ca-certificates &&
      curl -fsSL ${PRISMA_CLOUD_CONSOLE_URL}/api/v1/util/twistcli -o /tmp/twistcli &&
      chmod +x /tmp/twistcli &&
      /tmp/twistcli coderepo scan --address ${PRISMA_CLOUD_CONSOLE_URL}
      --user ${PRISMA_CLOUD_USER} --password ${PRISMA_CLOUD_PASSWORD}
      --details --output-file /reports/twistlock-report.json /workspace"
    networks:
      - security_network

  # Security Monitoring Agent
  wazuh-agent:
    image: wazuh/wazuh-agent:4.4.0
    container_name: security-wazuh-agent
    environment:
      - WAZUH_MANAGER=${WAZUH_MANAGER_IP}
      - WAZUH_REGISTRATION_SERVER=${WAZUH_MANAGER_IP}
      - WAZUH_AGENT_GROUP=security-monitoring
    volumes:
      - ./wazuh-logs:/var/log/wazuh-agent
      - /var/log:/host-logs:ro
      - /etc/passwd:/etc/passwd:ro
      - /etc/group:/etc/group:ro
    networks:
      - security_network

  # API Security Gateway
  api-security-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile.security
    container_name: api-security-gateway
    environment:
      - RATE_LIMIT_ENABLED=true
      - WAF_ENABLED=true
      - API_KEY_VALIDATION=true
      - JWT_VALIDATION=true
      - OWASP_TOP10_PROTECTION=true
    ports:
      - '3000:3000'
    volumes:
      - ./gateway-config:/app/config:ro
      - ./gateway-logs:/app/logs
    networks:
      - security_network
    depends_on:
      - redis-security

  # Redis for Security Session Management
  redis-security:
    image: redis:7-alpine
    container_name: security-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_security_data:/data
    networks:
      - security_network

  # PostgreSQL for Security Data
  postgres:
    image: postgres:15-alpine
    container_name: security-postgres
    environment:
      - POSTGRES_DB=security_db
      - POSTGRES_USER=security
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
    volumes:
      - postgres_security_data:/var/lib/postgresql/data
      - ./init-security-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - security_network
    secrets:
      - postgres_password

  # Security Metrics and Alerting
  prometheus-security:
    image: prom/prometheus:latest
    container_name: security-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=90d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./prometheus-security.yml:/etc/prometheus/prometheus.yml:ro
      - ./security-rules.yml:/etc/prometheus/security-rules.yml:ro
      - prometheus_security_data:/prometheus
    ports:
      - '9090:9090'
    networks:
      - security_network

  # Security Alert Manager
  alertmanager:
    image: prom/alertmanager:latest
    container_name: security-alertmanager
    command:
      - '--config.file=/etc/alertmanager/config.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    volumes:
      - ./alertmanager-security.yml:/etc/alertmanager/config.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - '9093:9093'
    networks:
      - security_network

  # Security Report Generator
  security-reporter:
    build:
      context: ./security-reporter
      dockerfile: Dockerfile
    container_name: security-report-generator
    environment:
      - REPORT_SCHEDULE=0 2 * * * # Daily at 2 AM
      - ELASTICSEARCH_URL=http://security-siem:9200
      - PROMETHEUS_URL=http://prometheus-security:9090
      - OUTPUT_FORMAT=pdf,html,json
    volumes:
      - ./security-reports:/app/reports
      - ./report-templates:/app/templates:ro
    networks:
      - security_network
    depends_on:
      - security-siem
      - prometheus-security

volumes:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions:
  elasticsearch_data:
  redis_security_data:
  postgres_security_data:
  prometheus_security_data:
  alertmanager_data:

networks:
  security_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.40.0.0/16

secrets:
  sonar_db_password:
    file: ./secrets/sonar_db_password.txt
  postgres_password:
    file: ./secrets/postgres_password.txt