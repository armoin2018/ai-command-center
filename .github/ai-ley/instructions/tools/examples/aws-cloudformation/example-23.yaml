AWSTemplateFormatVersion: '2010-09-09'
Description: 'Comprehensive Monitoring and Observability Stack'

Parameters:
  Environment:
    Type: String
    AllowedValues: [dev, staging, production]
    Default: dev
  AlertEmail:
    Type: String
    Description: Email for operational alerts

Resources:
  # Custom CloudWatch dashboard
  OperationalDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub 'Enterprise-Operations-${Environment}'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/ApplicationELB", "TargetResponseTime", "LoadBalancer", "${ApplicationLoadBalancer}"],
                  [".", "RequestCount", ".", "."],
                  [".", "HTTPCode_Target_2XX_Count", ".", "."],
                  [".", "HTTPCode_Target_4XX_Count", ".", "."],
                  [".", "HTTPCode_Target_5XX_Count", ".", "."]
                ],
                "period": 300,
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "Application Load Balancer Metrics"
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  ["AWS/Lambda", "Duration", "FunctionName", "${ProcessingFunction}"],
                  [".", "Errors", ".", "."],
                  [".", "Invocations", ".", "."],
                  [".", "Throttles", ".", "."]
                ],
                "period": 300,
                "stat": "Average",
                "region": "${AWS::Region}",
                "title": "Lambda Function Metrics"
              }
            },
            {
              "type": "log",
              "x": 0,
              "y": 6,
              "width": 24,
              "height": 6,
              "properties": {
                "query": "SOURCE '/aws/lambda/${ProcessingFunction}' | fields @timestamp, @message\n| filter @message like /ERROR/\n| sort @timestamp desc\n| limit 100",
                "region": "${AWS::Region}",
                "title": "Recent Errors",
                "view": "table"
              }
            }
          ]
        }

  # Application Load Balancer for monitoring
  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub 'enterprise-alb-${Environment}'
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup
      LoadBalancerAttributes:
        - Key: access_logs.s3.enabled
          Value: true
        - Key: access_logs.s3.bucket
          Value: !Ref ALBAccessLogsBucket
        - Key: access_logs.s3.prefix
          Value: alb-logs
      Tags:
        - Key: Environment
          Value: !Ref Environment

  # Lambda function for processing
  ProcessingFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub 'enterprise-processor-${Environment}'
      Runtime: python3.9
      Handler: index.handler
      Timeout: 300
      Environment:
        Variables:
          ENVIRONMENT: !Ref Environment
      Code:
        ZipFile: |
          import json
          import boto3
          import time
          import random

          cloudwatch = boto3.client('cloudwatch')

          def handler(event, context):
              """Sample processing function with custom metrics"""
              
              start_time = time.time()
              
              try:
                  # Simulate processing
                  processing_time = random.uniform(0.1, 2.0)
                  time.sleep(processing_time)
                  
                  # Send custom metrics
                  cloudwatch.put_metric_data(
                      Namespace='Enterprise/Processing',
                      MetricData=[
                          {
                              'MetricName': 'ProcessingDuration',
                              'Value': processing_time,
                              'Unit': 'Seconds',
                              'Dimensions': [
                                  {
                                      'Name': 'Environment',
                                      'Value': os.environ['ENVIRONMENT']
                                  }
                              ]
                          },
                          {
                              'MetricName': 'ProcessedItems',
                              'Value': len(event.get('Records', [])),
                              'Unit': 'Count',
                              'Dimensions': [
                                  {
                                      'Name': 'Environment',
                                      'Value': os.environ['ENVIRONMENT']
                                  }
                              ]
                          }
                      ]
                  )
                  
                  return {
                      'statusCode': 200,
                      'body': json.dumps({
                          'message': 'Processing completed successfully',
                          'processingTime': processing_time,
                          'itemsProcessed': len(event.get('Records', []))
                      })
                  }
                  
              except Exception as e:
                  # Log error for monitoring
                  print(f"ERROR: Processing failed - {str(e)}")
                  
                  # Send error metric
                  cloudwatch.put_metric_data(
                      Namespace='Enterprise/Processing',
                      MetricData=[
                          {
                              'MetricName': 'ProcessingErrors',
                              'Value': 1,
                              'Unit': 'Count',
                              'Dimensions': [
                                  {
                                      'Name': 'Environment',
                                      'Value': os.environ['ENVIRONMENT']
                                  }
                              ]
                          }
                      ]
                  )
                  
                  raise
      Role: !GetAtt ProcessingFunctionRole.Arn

  ProcessingFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: CloudWatchMetrics
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricData
                Resource: '*'

  # CloudWatch alarms for proactive monitoring
  HighErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'HighErrorRate-${Environment}'
      AlarmDescription: High error rate detected
      MetricName: Errors
      Namespace: AWS/Lambda
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref ProcessingFunction
      AlarmActions:
        - !Ref CriticalAlertsTopic
      OKActions:
        - !Ref CriticalAlertsTopic

  HighLatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'HighLatency-${Environment}'
      AlarmDescription: High response time detected
      MetricName: Duration
      Namespace: AWS/Lambda
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 5000
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: FunctionName
          Value: !Ref ProcessingFunction
      AlarmActions:
        - !Ref WarningAlertsTopic

  # SNS topics for different alert levels
  CriticalAlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'enterprise-critical-alerts-${Environment}'
      DisplayName: Critical Alerts
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlertEmail

  WarningAlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub 'enterprise-warning-alerts-${Environment}'
      DisplayName: Warning Alerts
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlertEmail

  # X-Ray tracing for detailed performance analysis
  XRayServiceMap:
    Type: AWS::XRay::SamplingRule
    Properties:
      SamplingRule:
        RuleName: !Sub 'enterprise-sampling-${Environment}'
        Priority: 9000
        FixedRate: 0.1
        ReservoirSize: 1
        ServiceName: '*'
        ServiceType: '*'
        Host: '*'
        ResourceARN: '*'
        URLPath: '*'
        HTTPMethod: '*'
        Version: 1

Outputs:
  DashboardURL:
    Description: CloudWatch Dashboard URL
    Value: !Sub 'https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${OperationalDashboard}'

  CriticalAlertsTopic:
    Description: SNS Topic for Critical Alerts
    Value: !Ref CriticalAlertsTopic
    Export:
      Name: !Sub '${AWS::StackName}-CriticalAlerts'